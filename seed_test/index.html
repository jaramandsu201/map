<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 실시간 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .loc-btn {
            width: 55px; height: 55px; background: white; border: 2px solid #4285F4;
            border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease-in-out;
        }
        /* 실시간 추적 활성화 시 구글 블루 스타일 */
        .loc-btn.active {
            background: #4285F4;
            color: white;
            border-color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button id="locateBtn" class="loc-btn" onclick="toggleLocation()" title="실시간 위치 추적">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 초기화 및 브이월드 항공사진 설정
var map = L.map('map').setView([36.5, 127.5], 7);
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 2. 속성 팝업 생성 함수
function createPopup(feature, filterFields) {
    if (!feature.properties) return "데이터 없음";
    let props = filterFields && filterFields.length > 0 ? filterFields : Object.keys(feature.properties);
    return props.map(key => `<b>${key}:</b> ${feature.properties[key] !== null ? feature.properties[key] : "없음"}`).join("<br>");
}

// 3. 레이어 자동 로드 (config.json 기준)
fetch('./config.json').then(res => res.json()).then(layers => {
    let bounds = L.latLngBounds();
    layers.forEach(info => {
        fetch(`./${info.file}`).then(res => res.json()).then(data => {
            var geoLayer = L.geoJSON(data, {
                style: { color: info.color, weight: 4, opacity: 1.0, fillOpacity: 1.0 },
                pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
                    radius: 8, fillColor: info.color, color: "#ffffff", weight: 2, opacity: 1.0, fillOpacity: 1.0
                }),
                onEachFeature: (f, l) => l.bindPopup(createPopup(f, info.fields))
            }).addTo(map);
            if (data.features.length > 0) {
                bounds.extend(geoLayer.getBounds());
                map.fitBounds(bounds);
            }
        });
    });
});

// 4. [핵심] 고정밀 위치 추적 및 보정 로직
var currentMarker, currentCircle;
var isTracking = false;
var lastValidLatLng = null;

map.on('locationfound', function(e) {
    // [보정 1] 정확도가 너무 낮은 데이터(오차 40m 초과)는 화면 이동 패스
    // 마커는 그리되 지도가 휙휙 돌아가는 현상을 방지함
    
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    // 구글 지도 스타일 마커
    currentMarker = L.circleMarker(e.latlng, { 
        radius: 9, fillColor: '#4285F4', color: 'white', weight: 3, fillOpacity: 1 
    }).addTo(map).bindPopup("현재 위치");

    // 오차 범위를 흐릿한 원으로 표시 (산악 지형 필수 시각화)
    currentCircle = L.circle(e.latlng, e.accuracy, { 
        color: '#4285F4', fillOpacity: 0.15, weight: 1, stroke: false
    }).addTo(map);

    if (isTracking) {
        // [보정 2] 정확도가 낮으면 대기하고, 7미터 이상 이동 시에만 부드럽게 추적
        if (e.accuracy <= 40) {
            if (!lastValidLatLng || lastValidLatLng.distanceTo(e.latlng) > 7) {
                // flyTo를 사용하여 스르륵 이동 (구글 지도 느낌)
                map.flyTo(e.latlng, 18, {
                    animate: true,
                    duration: 0.8
                });
                lastValidLatLng = e.latlng;
            }
        }
    }
});

map.on('locationerror', function(e) {
    console.warn("GPS 신호 수신 대기 중...");
});

// 버튼 토글 함수
function toggleLocation() {
    var btn = document.getElementById('locateBtn');
    if (isTracking) {
        isTracking = false;
        lastValidLatLng = null;
        btn.classList.remove('active');
        map.stopLocate();
        if (currentMarker) map.removeLayer(currentMarker);
        if (currentCircle) map.removeLayer(currentCircle);
    } else {
        isTracking = true;
        btn.classList.add('active');
        // [보정 3] GPS 옵션 최적화
        map.locate({ 
            watch: true, 
            enableHighAccuracy: true,
            maximumAge: 2000, // 2초 이내 데이터만 사용
            timeout: 20000 
        });
    }
}
</script>
</body>
</html>
