<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 실시간 지도 (보정 모드)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .loc-btn {
            width: 55px; height: 55px; background: white; border: 2px solid #0055ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .loc-btn.active { background: #0055ff; color: white; border-color: white; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button id="locateBtn" class="loc-btn" onclick="toggleLocation()" title="실시간 위치 추적">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 및 브이월드 배경 설정
var map = L.map('map').setView([36.5, 127.5], 7);
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 2. 팝업 생성 함수
function createPopup(feature, filterFields) {
    if (!feature.properties) return "데이터 없음";
    let props = filterFields && filterFields.length > 0 ? filterFields : Object.keys(feature.properties);
    return props.map(key => `<b>${key}:</b> ${feature.properties[key] !== null ? feature.properties[key] : "없음"}`).join("<br>");
}

// 3. config.json 로드 및 레이어 자동 생성
fetch('./config.json').then(res => res.json()).then(layers => {
    let bounds = L.latLngBounds();
    layers.forEach(info => {
        fetch(`./${info.file}`).then(res => res.json()).then(data => {
            var geoLayer = L.geoJSON(data, {
                style: { color: info.color, weight: 4, opacity: 1.0, fillOpacity: 1.0 },
                pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
                    radius: 8, fillColor: info.color, color: "#ffffff", weight: 2, opacity: 1.0, fillOpacity: 1.0
                }),
                onEachFeature: (f, l) => l.bindPopup(createPopup(f, info.fields))
            }).addTo(map);
            if (data.features.length > 0) {
                bounds.extend(geoLayer.getBounds());
                map.fitBounds(bounds);
            }
        });
    });
});

// 4. 위치 보정 및 추적 로직
var currentMarker, currentCircle;
var isTracking = false;
var latlngHistory = []; // 최근 좌표 저장용
var HISTORY_SIZE = 5;   // 평균을 낼 샘플 개수 (숫자가 클수록 묵직하고 느려짐)

map.on('locationfound', function(e) {
    // 새로운 좌표 기록
    latlngHistory.push(e.latlng);
    if (latlngHistory.length > HISTORY_SIZE) latlngHistory.shift();

    // 최근 좌표들의 평균값 계산
    var avgLat = 0, avgLng = 0;
    latlngHistory.forEach(ll => {
        avgLat += ll.lat;
        avgLng += ll.lng;
    });
    var smoothedLatLng = L.latLng(avgLat / latlngHistory.length, avgLng / latlngHistory.length);

    // 마커 업데이트
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    currentMarker = L.circleMarker(smoothedLatLng, { 
        radius: 10, fillColor: '#0078ff', color: 'white', weight: 3, fillOpacity: 1 
    }).addTo(map).bindPopup("보정된 현재 위치");

    currentCircle = L.circle(smoothedLatLng, e.accuracy / 2, { 
        color: '#0078ff', fillOpacity: 0.1, weight: 1 
    }).addTo(map);

    // 추적 모드일 때만 부드럽게 화면 중심 이동
    if (isTracking) {
        map.panTo(smoothedLatLng);
        if (latlngHistory.length === 1) currentMarker.openPopup();
    }
});

function toggleLocation() {
    var btn = document.getElementById('locateBtn');
    if (isTracking) {
        isTracking = false;
        latlngHistory = [];
        btn.classList.remove('active');
        map.stopLocate();
    } else {
        isTracking = true;
        btn.classList.add('active');
        map.locate({ watch: true, enableHighAccuracy: true });
    }
}
</script>
</body>
</html>
