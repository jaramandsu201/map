<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 데이터 테스트</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
        }
        .loc-btn {
            width: 50px; height: 50px; background: white; border: 2px solid #0055ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button class="loc-btn" onclick="manualLocate()" title="내 위치 찾기">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 초기 설정
var map = L.map('map').setView([37.0, 127.1], 8);

// 2. 배경 지도 → 대한민국 국토교통부 V-World 항공사진 (최신)
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 3. 사용자 제공 포인트 데이터 (하드코딩)
var work_area = {
    "type": "FeatureCollection",
    "name": "조사지점_테스트",
    "features": [
        { "type": "Feature", "properties": { "fid": 1.0, "주소": null, "가는길": null, "no": 20 }, "geometry": { "type": "Point", "coordinates": [ 127.179307573054103, 37.034491953433161 ] } },
        { "type": "Feature", "properties": { "fid": 2.0, "주소": null, "가는길": null, "no": 23 }, "geometry": { "type": "Point", "coordinates": [ 127.165033554845579, 37.24664136326556 ] } },
        { "type": "Feature", "properties": { "fid": 3.0, "주소": null, "가는길": null, "no": 24 }, "geometry": { "type": "Point", "coordinates": [ 127.162224964507118, 37.290072281637336 ] } },
        { "type": "Feature", "properties": { "fid": 4.0, "주소": null, "가는길": null, "no": 19 }, "geometry": { "type": "Point", "coordinates": [ 127.189905232072519, 37.018637967223128 ] } },
        { "type": "Feature", "properties": { "fid": 5.0, "주소": null, "가는길": null, "no": 18 }, "geometry": { "type": "Point", "coordinates": [ 127.18036033022257, 36.997276913223317 ] } },
        { "type": "Feature", "properties": { "fid": 6.0, "주소": null, "가는길": null, "no": 17 }, "geometry": { "type": "Point", "coordinates": [ 127.120370489355579, 36.92312735201665 ] } },
        { "type": "Feature", "properties": { "fid": 7.0, "주소": null, "가는길": null, "no": 16 }, "geometry": { "type": "Point", "coordinates": [ 127.096222103259919, 36.885728435312735 ] } },
        { "type": "Feature", "properties": { "fid": 8.0, "주소": null, "가는길": null, "no": 15 }, "geometry": { "type": "Point", "coordinates": [ 127.087496795811632, 36.847283040324022 ] } },
        { "type": "Feature", "properties": { "fid": 9.0, "주소": null, "가는길": null, "no": 14 }, "geometry": { "type": "Point", "coordinates": [ 127.086845107086475, 36.832545389874092 ] } },
        { "type": "Feature", "properties": { "fid": 10.0, "주소": null, "가는길": null, "no": 12 }, "geometry": { "type": "Point", "coordinates": [ 127.051389077912049, 36.866295545916117 ] } },
        { "type": "Feature", "properties": { "fid": 11.0, "주소": null, "가는길": null, "no": 8 }, "geometry": { "type": "Point", "coordinates": [ 126.961105100239919, 37.004770841750371 ] } },
        { "type": "Feature", "properties": { "fid": 12.0, "주소": null, "가는길": null, "no": 4 }, "geometry": { "type": "Point", "coordinates": [ 126.941488526080306, 37.138704577142477 ] } },
        { "type": "Feature", "properties": { "fid": 13.0, "주소": null, "가는길": null, "no": 3 }, "geometry": { "type": "Point", "coordinates": [ 126.925529128885259, 37.200222611675827 ] } },
        { "type": "Feature", "properties": { "fid": 14.0, "주소": null, "가는길": null, "no": 2 }, "geometry": { "type": "Point", "coordinates": [ 126.899476392709232, 37.24822559123519 ] } },
        { "type": "Feature", "properties": { "fid": 15.0, "주소": null, "가는길": null, "no": 1 }, "geometry": { "type": "Point", "coordinates": [ 126.896957563267961, 37.281361110308538 ] } },
        { "type": "Feature", "properties": { "fid": 16.0, "주소": "경기 성남시 분당구 석운동 63-6", "가는길": null, "no": 25 }, "geometry": { "type": "Point", "coordinates": [ 127.045618268250308, 37.374591283622351 ] } },
        { "type": "Feature", "properties": { "fid": 17.0, "주소": null, "가는길": null, "no": 5 }, "geometry": { "type": "Point", "coordinates": [ 126.93972079476525, 37.122826405228309 ] } },
        { "type": "Feature", "properties": { "fid": 18.0, "주소": null, "가는길": null, "no": 6 }, "geometry": { "type": "Point", "coordinates": [ 126.963942819252139, 37.045796944289201 ] } },
        { "type": "Feature", "properties": { "fid": 19.0, "주소": null, "가는길": null, "no": 7 }, "geometry": { "type": "Point", "coordinates": [ 126.965765477470228, 37.023010704643049 ] } },
        { "type": "Feature", "properties": { "fid": 20.0, "주소": null, "가는길": null, "no": 9 }, "geometry": { "type": "Point", "coordinates": [ 126.958430469204345, 36.995933814396132 ] } },
        { "type": "Feature", "properties": { "fid": 21.0, "주소": null, "가는길": null, "no": 10 }, "geometry": { "type": "Point", "coordinates": [ 127.018813714252232, 36.907544137371907 ] } },
        { "type": "Feature", "properties": { "fid": 22.0, "주소": null, "가는길": null, "no": 11 }, "geometry": { "type": "Point", "coordinates": [ 127.029504306945498, 36.878343492745039 ] } },
        { "type": "Feature", "properties": { "fid": 23.0, "주소": null, "가는길": null, "no": 13 }, "geometry": { "type": "Point", "coordinates": [ 127.059221454728743, 36.845795943592755 ] } },
        { "type": "Feature", "properties": { "fid": 24.0, "주소": null, "가는길": null, "no": 22 }, "geometry": { "type": "Point", "coordinates": [ 127.208292129926619, 37.212307117290877 ] } },
        { "type": "Feature", "properties": { "fid": 25.0, "주소": null, "가는길": null, "no": 21 }, "geometry": { "type": "Point", "coordinates": [ 127.247104784755408, 37.162983618676847 ] } }
    ]
};

// 4. 지도에 포인트 추가 (빨간색 원)
var pointsLayer = L.geoJSON(work_area, {
    pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, {
            radius: 7, fillColor: 'red', color: '#000', weight: 1, opacity: 1, fillOpacity: 0.8
        }).bindPopup("No: " + feature.properties.no + "<br>주소: " + (feature.properties.주소 || "없음"));
    }
}).addTo(map);

// 포인트 위치로 지도 이동
map.fitBounds(pointsLayer.getBounds());

// 5. 수동 위치 추적 로직 (버튼 클릭 시에만 작동)
var currentMarker = null;
var currentCircle = null;

map.on('locationfound', function(e) {
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    currentMarker = L.circleMarker(e.latlng, {
        radius: 10, fillColor: '#0078ff', color: 'white', weight: 3, opacity: 1, fillOpacity: 1
    }).addTo(map).bindPopup("내 현재 위치").openPopup();

    currentCircle = L.circle(e.latlng, e.accuracy / 2, {
        color: '#0078ff', fillOpacity: 0.1, weight: 1
    }).addTo(map);

    map.setView(e.latlng, 18);
    map.stopLocate(); 
});

function manualLocate() {
    map.locate({
        setView: false, 
        watch: false, 
        enableHighAccuracy: true 
    });
}
</script>
</body>
</html>
