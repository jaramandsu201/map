<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 실시간 지도 (V-World)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
        }
        .loc-btn {
            width: 50px; height: 50px; background: white; border: 2px solid #0055ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button class="loc-btn" onclick="manualLocate()" title="내 위치 찾기">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 초기 설정
var map = L.map('map').setView([36.5, 127.5], 7);

// 2. 배경 지도 → 대한민국 국토교통부 V-World 항공사진 (최신)
var vworldSatellite = L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19,
    minZoom: 6
}).addTo(map);

// [선택사항] 하이브리드 레이어 (항공사진 위에 도로명/지명 표시)
// 필요하시면 아래 주석을 해제하세요.
/*
var vworldHybrid = L.tileLayer('https://xdworld.vworld.kr/2d/Hybrid/service/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);
*/

function onEachFeature(feature, layer) {
    if (feature.properties) {
        var popupContent = Object.keys(feature.properties)
            .map(key => `<b>${key}:</b> ${feature.properties[key]}`)
            .join("<br>");
        layer.bindPopup(popupContent);
    }
}

// 3. GeoJSON 데이터 로드 (경로 및 변수명 유지)
fetch('./가공.geojson').then(res => res.json()).then(data => {
    L.geoJSON(data, { style: { color: 'red', weight: 3, opacity: 0.8 }, onEachFeature: onEachFeature }).addTo(map);
}).catch(e => console.log("가공 로드 대기..."));

fetch('./조사시점.geojson').then(res => res.json()).then(data => {
    var geoLayer = L.geoJSON(data, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, { radius: 7, fillColor: "#3388ff", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.9 });
        },
        onEachFeature: onEachFeature
    }).addTo(map);
    if(data.features.length > 0) map.fitBounds(geoLayer.getBounds());
}).catch(e => console.log("조사시점 로드 대기..."));

// 4. 위치 추적 로직 (수동 실행 전용)
var currentMarker = null;
var currentCircle = null;

map.on('locationfound', function(e) {
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    currentMarker = L.circleMarker(e.latlng, {
        radius: 10, fillColor: '#0078ff', color: 'white', weight: 3, opacity: 1, fillOpacity: 1
    }).addTo(map).bindPopup("내 현재 위치").openPopup();

    currentCircle = L.circle(e.latlng, e.accuracy / 2, {
        color: '#0078ff', fillOpacity: 0.1, weight: 1
    }).addTo(map);

    map.setView(e.latlng, 18);
    map.stopLocate(); // 위치 찾은 후 즉시 정지
});

map.on('locationerror', function(e) {
    alert("위치 정보를 가져올 수 없습니다. GPS 권한을 확인하세요.");
});

function manualLocate() {
    map.locate({
        setView: false, 
        watch: false, 
        enableHighAccuracy: true 
    });
}
</script>
</body>
</html>
