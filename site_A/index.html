<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 실시간 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; }
        
        /* 버튼 스타일 - 모바일에서 누르기 편하게 크게 설정 */
        .location-control {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
        }
        .loc-btn {
            width: 50px; height: 50px; background: white; border: 2px solid #3388ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button class="loc-btn" onclick="startTracking()" title="내 위치 찾기">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 초기 설정
var map = L.map('map').setView([37.0, 127.1], 8);

// 2. 배경 지도 (Esri 최신 위성영상)
var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics',
    maxZoom: 19
}).addTo(map);

// 3. 레이어 스타일 및 팝업 설정 함수
function onEachFeature(feature, layer) {
    if (feature.properties) {
        var popupContent = Object.keys(feature.properties)
            .map(key => `<b>${key}:</b> ${feature.properties[key]}`)
            .join("<br>");
        layer.bindPopup(popupContent);
    }
}

// 4. 외부 GeoJSON 파일 불러오기 (가공.geojson / 조사시점.geojson)
// 파일이 index.html과 같은 폴더(site_A)에 있어야 합니다.

// [가공 레이어 - 빨간색]
fetch('./가공.geojson')
    .then(res => res.json())
    .then(data => {
        L.geoJSON(data, {
            style: { color: 'red', weight: 3, opacity: 0.8 },
            onEachFeature: onEachFeature
        }).addTo(map);
    }).catch(e => console.log("가공.geojson 로드 대기 중..."));

// [조사시점 레이어 - 파란색 포인트 또는 선]
fetch('./조사시점.geojson')
    .then(res => res.json())
    .then(data => {
        var geoLayer = L.geoJSON(data, {
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 7, fillColor: "#3388ff", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.9
                });
            },
            onEachFeature: onEachFeature
        }).addTo(map);
        
        // 데이터가 있으면 해당 영역으로 지도 자동 이동
        if(data.features.length > 0) map.fitBounds(geoLayer.getBounds());
    }).catch(e => console.log("조사시점.geojson 로드 대기 중..."));

// 5. 실시간 위치 추적 로직 (보내주신 GPT 코드 방식 적용)
var currentMarker = null;
var currentCircle = null;

function onLocationFound(e) {
    // 이전 마커 제거
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    // 현재 위치 표시 (파란색 점 + 정확도 범위)
    currentMarker = L.circleMarker(e.latlng, {
        radius: 8, fillColor: '#0078ff', color: 'white', weight: 3, opacity: 1, fillOpacity: 1
    }).addTo(map).bindPopup("현재 위치").openPopup();

    currentCircle = L.circle(e.latlng, e.accuracy / 2, {
        color: '#0078ff', fillOpacity: 0.1, weight: 1
    }).addTo(map);
}

function onLocationError(e) {
    alert("위치 정보를 가져올 수 없습니다. GPS와 브라우저 권한을 확인해주세요.");
}

map.on('locationfound', onLocationFound);
map.on('locationerror', onLocationError);

// 버튼 클릭 시 수행할 함수
function startTracking() {
    map.locate({
        setView: true, 
        maxZoom: 18, 
        watch: true,           // 위치가 바뀌면 자동으로 따라감
        enableHighAccuracy: true // GPS 모드 활성화
    });
}

// 페이지 열자마자 바로 추적 시작
startTracking();

</script>
</body>
</html>
