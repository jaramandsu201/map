<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>신탕정 조사지점</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .loc-btn {
            width: 55px; height: 55px; background: white; border: 2px solid #0055ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button class="loc-btn" onclick="manualLocate()">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([36.5, 127.5], 7);

// 브이월드 항공사진
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 팝업 생성 함수 (선택적 필드 필터링 기능 추가)
function createPopup(feature, filterFields) {
    if (!feature.properties) return "데이터 없음";
    
    // config에 fields가 지정되어 있으면 해당 필드만, 없으면 전체 출력
    let props = filterFields && filterFields.length > 0 
                ? filterFields 
                : Object.keys(feature.properties);

    return props.map(key => {
        let value = feature.properties[key] !== null ? feature.properties[key] : "없음";
        return `<b>${key}:</b> ${value}`;
    }).join("<br>");
}

// config.json 로드 및 레이어 자동 생성
fetch('./config.json')
    .then(res => res.json())
    .then(layers => {
        let bounds = L.latLngBounds();

        layers.forEach(info => {
            fetch(`./${info.file}`)
                .then(res => res.json())
                .then(data => {
                    var geoLayer = L.geoJSON(data, {
                        style: { color: info.color, weight: 3, opacity: 0.8 },
                        pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
                            radius: 7, fillColor: info.color, color: "#fff", weight: 2, fillOpacity: 0.9
                        }),
                        onEachFeature: function(feature, layer) {
                            // 각 레이어별로 지정된 fields를 전달
                            layer.bindPopup(createPopup(feature, info.fields));
                        }
                    }).addTo(map);

                    if (data.features.length > 0) {
                        bounds.extend(geoLayer.getBounds());
                        map.fitBounds(bounds);
                    }
                })
                .catch(e => console.error(`${info.file} 로드 실패`, e));
        });
    });

// 위치 추적 로직 (마커 팝업 복구)
var currentMarker, currentCircle;
map.on('locationfound', function(e) {
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    currentMarker = L.circleMarker(e.latlng, { 
        radius: 10, fillColor: '#0078ff', color: 'white', weight: 3, fillOpacity: 1 
    }).addTo(map).bindPopup("현재 위치").openPopup(); // 팝업 복구 및 자동 열기

    currentCircle = L.circle(e.latlng, e.accuracy / 2, { 
        color: '#0078ff', fillOpacity: 0.1, weight: 1 
    }).addTo(map);

    map.setView(e.latlng, 18);
    map.stopLocate();
});

function manualLocate() {
    map.locate({ setView: false, watch: false, enableHighAccuracy: true });
}
</script>
</body>
</html>
