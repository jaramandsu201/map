<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>현장조사 실시간 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .loc-btn {
            width: 55px; height: 55px; background: white; border: 2px solid #0055ff;
            border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        /* 실시간 추적 중일 때 버튼 스타일 변화 */
        .loc-btn.active {
            background: #0055ff;
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button id="locateBtn" class="loc-btn" onclick="toggleLocation()" title="실시간 위치 추적">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 지도 및 브이월드 배경 설정
var map = L.map('map').setView([36.5, 127.5], 7);
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 2. 팝업 생성 함수
function createPopup(feature, filterFields) {
    if (!feature.properties) return "데이터 없음";
    let props = filterFields && filterFields.length > 0 ? filterFields : Object.keys(feature.properties);
    return props.map(key => {
        let value = feature.properties[key] !== null ? feature.properties[key] : "없음";
        return `<b>${key}:</b> ${value}`;
    }).join("<br>");
}

// 3. 데이터 로드 (config.json)
fetch('./config.json').then(res => res.json()).then(layers => {
    let bounds = L.latLngBounds();
    layers.forEach(info => {
        fetch(`./${info.file}`).then(res => res.json()).then(data => {
            var geoLayer = L.geoJSON(data, {
                style: { color: info.color, weight: 4, opacity: 1.0, fillOpacity: 1.0 },
                pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
                    radius: 8, fillColor: info.color, color: "#ffffff", weight: 2, opacity: 1.0, fillOpacity: 1.0
                }),
                onEachFeature: (f, l) => l.bindPopup(createPopup(f, info.fields))
            }).addTo(map);
            if (data.features.length > 0) {
                bounds.extend(geoLayer.getBounds());
                map.fitBounds(bounds);
            }
        });
    });
});

// 4. 위치 추적 변수 및 로직
var currentMarker, currentCircle;
var isTracking = false; // 현재 추적 상태 변수

// 위치를 찾았을 때 실행되는 이벤트
map.on('locationfound', function(e) {
    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    currentMarker = L.circleMarker(e.latlng, { 
        radius: 10, fillColor: '#0078ff', color: 'white', weight: 3, fillOpacity: 1 
    }).addTo(map).bindPopup("현재 위치").openPopup();

    currentCircle = L.circle(e.latlng, e.accuracy / 2, { 
        color: '#0078ff', fillOpacity: 0.1, weight: 1 
    }).addTo(map);

    // 추적 모드일 때는 화면을 내 위치로 계속 이동
    map.setView(e.latlng, 18);
});

map.on('locationerror', function(e) {
    alert("위치 정보를 가져올 수 없습니다.");
    stopTracking();
});

// 추적 시작 함수
function startTracking() {
    isTracking = true;
    document.getElementById('locateBtn').classList.add('active'); // 버튼 색상 변경
    map.locate({ setView: true, watch: true, enableHighAccuracy: true });
}

// 추적 중지 함수
function stopTracking() {
    isTracking = false;
    document.getElementById('locateBtn').classList.remove('active'); // 버튼 색상 복구
    map.stopLocate();
}

// 버튼 클릭 시 호출되는 토글 함수
function toggleLocation() {
    if (isTracking) {
        stopTracking();
    } else {
        startTracking();
    }
}
</script>
</body>
</html>
