<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>신탕정</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .location-control { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .loc-btn {
            width: 55px; height: 55px; background: white; border: 2px solid #4285F4;
            border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .loc-btn.active { background: #4285F4; color: white; border-color: white; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-control">
    <button id="locateBtn" class="loc-btn" onclick="toggleLocation()">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([36.5, 127.5], 7);
L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {
    attribution: '&copy; V-World / MOLIT',
    maxZoom: 19
}).addTo(map);

// 팝업 생성 함수
function createPopup(feature, filterFields) {
    if (!feature.properties) return "데이터 없음";
    let props = filterFields && filterFields.length > 0 ? filterFields : Object.keys(feature.properties);
    return props.map(key => `<b>${key}:</b> ${feature.properties[key] || "없음"}`).join("<br>");
}

// 레이어 자동 로드
fetch('./config.json').then(res => res.json()).then(layers => {
    let bounds = L.latLngBounds();
    layers.forEach(info => {
        fetch(`./${info.file}`).then(res => res.json()).then(data => {
            var geoLayer = L.geoJSON(data, {
                style: { color: info.color, weight: 4, opacity: 1.0, fillOpacity: 1.0 },
                pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
                    radius: 8, fillColor: info.color, color: "#ffffff", weight: 2, opacity: 1.0, fillOpacity: 1.0
                }),
                onEachFeature: (f, l) => l.bindPopup(createPopup(f, info.fields))
            }).addTo(map);
            if (data.features.length > 0) {
                bounds.extend(geoLayer.getBounds());
                map.fitBounds(bounds);
            }
        });
    });
});

// --- 옆동 순간이동 방지 로직 ---
var currentMarker, currentCircle;
var isTracking = false;
var lastValidLatLng = null;

map.on('locationfound', function(e) {
    // [강력 필터 1] 정확도가 25m보다 나쁘면(숫자가 크면) 무시합니다.
    // 실내에서 옆동으로 튀는 값은 보통 오차 범위가 30~100m 사이입니다.
    if (e.accuracy > 25) {
        console.warn("신호 불안정 (오차 " + Math.round(e.accuracy) + "m): 무시함");
        return; 
    }

    if (currentMarker) map.removeLayer(currentMarker);
    if (currentCircle) map.removeLayer(currentCircle);

    // 정상적인 값일 때만 마커 표시
    currentMarker = L.circleMarker(e.latlng, { 
        radius: 9, fillColor: '#4285F4', color: 'white', weight: 3, fillOpacity: 1 
    }).addTo(map).bindPopup("현재 위치 (" + Math.round(e.accuracy) + "m 오차)");

    currentCircle = L.circle(e.latlng, e.accuracy, { 
        color: '#4285F4', fillOpacity: 0.1, weight: 1, stroke: false
    }).addTo(map);

    if (isTracking) {
        // [강력 필터 2] 최소 5m 이상 움직였을 때만 화면 이동
        if (!lastValidLatLng || lastValidLatLng.distanceTo(e.latlng) > 5) {
            map.flyTo(e.latlng, 18, { animate: true, duration: 0.8 });
            lastValidLatLng = e.latlng;
        }
    }
});

function toggleLocation() {
    var btn = document.getElementById('locateBtn');
    if (isTracking) {
        isTracking = false;
        lastValidLatLng = null;
        btn.classList.remove('active');
        map.stopLocate();
        if (currentMarker) map.removeLayer(currentMarker);
        if (currentCircle) map.removeLayer(currentCircle);
    } else {
        isTracking = true;
        btn.classList.add('active');
        // 고정밀 모드 사용
        map.locate({ watch: true, enableHighAccuracy: true });
    }
}
</script>
</body>
</html>
